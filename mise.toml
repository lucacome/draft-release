[tools]
hk = "1.38.0"
pkl = "0.31.0"
node = "24.14.0"
yarn = "4.12.0"
actionlint = "1.7.11"
yamllint = "1.38.0"
markdownlint-cli2 = "0.21.0"
gitleaks = "8.30.0"
editorconfig-checker = "3.6.1"
"npm:prettier" = "3.8.1"
"npm:eslint" = "10.0.3"
"pipx:codespell" = "2.4.2"

[tasks.install]
alias = "i"
description = "Install dependencies"
run = "yarn install"

[tasks.build]
alias = "b"
description = "Build the project"
run = "yarn run build"
depends = "install"

[tasks.lint]
alias = "l"
description = "Lint the codebase"
run = "hk check --all"

[tasks.format]
alias = "fmt"
description = "Format the codebase"
run = "hk fix --all"

[tasks.postlint]
description = "Run post-lint checks"
run = "git diff --exit-code"

[hooks]
postinstall = "mise run install"
